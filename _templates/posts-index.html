{% extends "layout.html" %}

{% block body %}
  <div class="content-overlay">
    <div class="content-card">
      <a href="/" class="close-btn" aria-label="Back to home">&times;</a>
      <h1>Blog</h1>
      {% if posts %}
      <ul class="blog-list">
        {% for post in posts %}
        <li>
          <a href="{{ post.slug }}">
            {% if post.parsed_date %}
            <span class="post-date">{{ post.parsed_date.strftime("%b %d, %Y") }}</span>
            {% endif %}
            <span class="post-title">{{ post.title }}</span>
          </a>
        </li>
        {% endfor %}
      </ul>
      {% endif %}
    </div>
  </div>
{% endblock %}
